name: Stock Screener

on:
  workflow_dispatch:
  schedule:
    # 北京时间周一至周五 11:33 (UTC时间 03:33)
    - cron: '33 3 * * 1-5'
    # 北京时间周一至周五 15:03 (UTC时间 07:08)
    - cron: '3 7 * * 1-5'

jobs:
  screener:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.9'
    
    - name: Install dependencies
      working-directory: stock-screener
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: Run stock screener
      working-directory: stock-screener
      env:
        FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
        TZ: Asia/Shanghai
        WECHAT_WORK_WEBHOOK: ${{ secrets.WECHAT_WORK_WEBHOOK }}
      run: |
        python main.py --max 5018 --output result.json
    
    - name: Upload results
      uses: actions/upload-artifact@v4
      with:
        name: screener-results
        path: |
          stock-screener/result.json
          stock-screener/result_*.json
          stock-screener/result_*.txt
    # 在你现有的 steps 最后添加这段
    - name: Upload files to repository
      run: |
        TIMESTAMP=$(date +"%Y%m%d_%H%M%S")
        mkdir -p backups/${TIMESTAMP}
        cp stock-screener/result*.json backups/${TIMESTAMP}/ 2>/dev/null || true
        cp stock-screener/result*.txt backups/${TIMESTAMP}/ 2>/dev/null || true

        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git add backups/

        # 只有在有变动时才提交，防止报错
        if git diff --staged --quiet; then
          echo "No changes to commit"
        else
          git commit -m "Backup news results: ${TIMESTAMP}"
          git push
        fi
